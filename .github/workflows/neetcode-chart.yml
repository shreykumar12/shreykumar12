name: Update NeetCode chart

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "assets/neetcode-chart.svg"

permissions:
  contents: write

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-neetcode-chart.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit chart if changed
        run: |
          if ! git diff --quiet -- assets/neetcode-chart.svg || [ -n "$(git status --porcelain assets/neetcode-chart.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/neetcode-chart.svg
            git commit -m "Update NeetCode submissions chart"
            git push
          fi
